<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ozoservir</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #f0f4f3;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 28px 24px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .logo {
        font-size: 22px;
        font-weight: 700;
        color: #225b56;
        margin-bottom: 20px;
      }
      .img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 16px;
        background: #e0e0e0;
      }
      .badge {
        display: inline-block;
        color: #fff;
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 20px;
        margin-bottom: 12px;
      }
      h2 {
        font-size: 20px;
        color: #1a1a1a;
        margin-bottom: 8px;
      }
      .price {
        font-size: 24px;
        font-weight: 700;
        color: #225b56;
        margin-bottom: 8px;
      }
      .desc {
        font-size: 14px;
        color: #666;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .btn1 {
        display: block;
        background: #225b56;
        color: #fff;
        padding: 14px 24px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .btn2 {
        display: block;
        background: #fff;
        color: #225b56;
        border: 2px solid #225b56;
        padding: 12px 24px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 16px;
      }
      .status {
        font-size: 13px;
        color: #999;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">Ozoservir</div>
      <div id="content"><p style="color: #666">Loading...</p></div>
    </div>

    <script>
      // ── Decode the ?ref= param (Base64 encoded "type:id") ──
      var params = new URLSearchParams(window.location.search);
      var ref = params.get('ref');
      var type = null;
      var id = null;

      if (ref) {
        try {
          var decoded = atob(ref);        // decode Base64 → "service:abc123"
          var parts = decoded.split(':'); // split into ["service", "abc123"]
          type = parts[0] || null;
          id = parts[1] || null;
        } catch (e) {
          type = null;
          id = null;
        }
      }
      // ── End of decode block ──

      var playStore =
        'https://play.google.com/store/apps/details?id=com.ozoservir_mobile';
      var ANON_KEY =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyY2x1cWVhbWpuemptcHd4aWV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzYwMzgwOTcsImV4cCI6MjA1MTYxNDA5N30.cVSnVo93iF5HCNNm9kQPj_eNBUHC_8FOlb_lM8VEGMQ';

      function loadListing() {
        if (!type || !id) {
          document.getElementById('content').innerHTML = '<p>Invalid link</p>';
          return;
        }

        var table = type === 'service' ? 'services' : 'sales';
        var url =
          'https://wrcluqeamjnzjmpwxiet.supabase.co/rest/v1/' +
          table +
          '?id=eq.' +
          id +
          '&select=title,description,photos,price,currency';

        fetch(url, {
          headers: {
            apikey: ANON_KEY,
            Authorization: 'Bearer ' + ANON_KEY,
          },
        })
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            var item = data[0];
            if (!item) {
              document.getElementById('content').innerHTML =
                '<p>Listing not found</p>' +
                '<br><a class="btn2" href="' +
                playStore +
                '">Download Ozoservir</a>';
              return;
            }

            var title = item.title || 'Ozoservir Listing';
            var desc = item.description || '';
            var image = item.photos && item.photos[0] ? item.photos[0] : '';
            var price = item.price || '';
            var currency = item.currency || '';
            var priceText = price ? currency + price : '';
            var badgeColor = type === 'service' ? '#9334E9' : '#2662E5';
            var badgeText = type === 'service' ? 'Service' : 'Sale';
            var intentUrl =
              'intent://listing/' +
              type +
              '/' +
              id +
              '#Intent;scheme=ozoservir' +
              ';package=com.ozoservir_mobile' +
              ';S.browser_fallback_url=' +
              encodeURIComponent(playStore) +
              ';end';

            var html = '';
            if (image) {
              html +=
                '<img class="img" src="' +
                image +
                '" onerror="this.style.display=\'none\'">';
            }
            html +=
              '<div class="badge" style="background:' +
              badgeColor +
              '">' +
              badgeText +
              '</div>';
            html += '<h2>' + title + '</h2>';
            if (priceText) {
              html += '<div class="price">' + priceText + '</div>';
            }
            html += '<p class="desc">' + desc + '</p>';
            html +=
              '<a class="btn1" href="' +
              intentUrl +
              '">Open in Ozoservir App</a>';
            html +=
              '<a class="btn2" href="' +
              playStore +
              '">Download Ozoservir - Its Free</a>';
            html +=
              '<p class="status">Tap the button above to open the app</p>';

            document.getElementById('content').innerHTML = html;
          })
          .catch(function () {
            document.getElementById('content').innerHTML =
              '<p style="color:#666;margin-bottom:16px">Something went wrong</p>' +
              '<a class="btn2" href="' +
              playStore +
              '">Download Ozoservir</a>';
          });
      }

      loadListing();
    </script>
  </body>
</html>
